name: Deploy blueprint to GitHub Pages

# Publishes the pre-generated blueprint site (blueprint/web/) to GitHub Pages.
# No Lean build is needed: the dependency graph is rendered in the browser via
# WebAssembly, so this only uploads the static files. Rebuild blueprint/web/ with
# `leanblueprint web` and commit it whenever blueprint/src/ changes.

on:
  push:
    branches: [main]
    paths:
      - 'blueprint/web/**'
      - '.github/workflows/blueprint.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload blueprint site
        uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint/web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
